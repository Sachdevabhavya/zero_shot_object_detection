camera:
  intrinsics:
    fx: 525.0  # Focal length x (Kinect default)
    fy: 525.0  # Focal length y
    cx: 319.5  # Optical center x
    cy: 239.5  # Optical center y

inference:
  yolo_conf: 0.0001  # Low threshold to ensure high recall
  depth_scale: 1000.0 # Factor to convert depth units to meters (if needed)